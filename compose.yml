version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-achat
    restart: unless-stopped
    environment:
      POSTGRES_DB: achat_en_ligne_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - achat-network

  redis:
    image: redis:7
    container_name: redis-achat
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - achat-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-achat
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - achat-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-achat
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - achat-network

networks:
  achat-network:

volumes:
  postgres_data: